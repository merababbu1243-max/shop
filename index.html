    <!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store - Products</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { 
            background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 10px; padding: 15px; width: 250px; text-align: center;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .card h3 { font-size: 18px; margin: 10px 0; text-transform: capitalize; }
        .card p { color: #e67e22; font-weight: bold; font-size: 16px; }
        .btn { 
            background: #ff8c00; color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 style="background: #ff8c00; color: white; padding: 10px;">Zain Store</h1>
    
    <div class="container" id="product-list">
        <p>Loading products...</p>
    </div>

    <script>
        // Apni Google Sheet ka CSV link yahan dalein
        const sheetID = 'APNI_SHEET_ID_YAHAN_LIKHEIN'; // Apni Sheet ID yahan dalein
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                // Google JSON format ko clean karna
                const json = JSON.parse(data.substr(47).slice(0, -2));
                const rows = json.table.rows;
                const productList = document.getElementById('product-list');
                productList.innerHTML = ''; // Loading text khatam karne ke liye

                rows.forEach(row => {
                    const name = row.c[0] ? row.c[0].v : 'No Name';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const image = row.c[2] ? row.c[2].v : ''; // Image URL
                    const category = row.c[3] ? row.c[3].v : '';
                    const desc = row.c[4] ? row.c[4].v : '';

                    // HTML Card banana
                    const card = `
                        <div class="card">
                            <img src="${image}" alt="${name}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                            <h3>${name}</h3>
                            <p>Rs ${price}</p>
                            <button class="btn">Add To Cart</button>
                        </div>
                    `;
                    productList.innerHTML += card;
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('product-list').innerHTML = 'Data load nahi ho saka.';
            });
    </script>
</body>
</html>
