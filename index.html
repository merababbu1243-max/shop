<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <header class="bg-white p-4 shadow-md text-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-orange-600">ZAIN STORE</h1>
    </header>

    <div id="productGrid" class="p-4 grid grid-cols-2 gap-4">
        <p id="msg" class="col-span-2 text-center text-gray-400">Loading...</p>
    </div>

    <script>
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const user = 'merababbu1243-max';
        const repo = 'mera';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        fetch(url).then(res => res.text()).then(csv => {
            const rows = csv.split('\n').map(r => r.split(','));
            const grid = document.getElementById('productGrid');
            grid.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const name = rows[i][0]?.replace(/"/g, '');
                const price = rows[i][1]?.replace(/"/g, '');
                const img = rows[i][2]?.replace(/"/g, '').trim(); // Sheet se P1.jpg uthayega
                
                if(!name) continue;

                // Photo GitHub ke 'shop' folder ke andar hai
                const photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/shop/${img}`;

                grid.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 text-center">
                        <img src="${photoUrl}" class="w-full h-32 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=Wait+Refresh'">
                        <h4 class="text-[10px] font-bold">${name}</h4>
                        <p class="text-orange-600 font-bold text-sm">Rs. ${price}</p>
                    </div>`;
            }
        });
    </script>
</body>
</html>
