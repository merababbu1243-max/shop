<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <header class="bg-white p-4 shadow-sm text-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-orange-600 italic">ZAIN STORE</h1>
    </header>

    <main class="p-4">
        <div class="bg-orange-500 rounded-2xl p-6 text-white text-center mb-6">
            <h2 class="text-xl font-bold uppercase">Our Products</h2>
            <p class="text-[10px] opacity-80 mt-1 uppercase">Shop Now via WhatsApp</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4">
            <p id="msg" class="col-span-2 text-center py-10 text-gray-400">Loading Store Items...</p>
        </div>
    </main>

    <script>
        // Sahi Sheet ID aur GitHub details
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const githubUser = 'merababbu1243-max';
        const repoName = 'mera';
        
        // CSV format use kar rahe hain jo zyada reliable hai
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const rows = csvText.split('\n').map(row => row.split(','));
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; 

                // Row 1 header hai, Row 2 se start karenge
                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i][0] ? rows[i][0].replace(/"/g, '') : '';
                    const price = rows[i][1] ? rows[i][1].replace(/"/g, '') : '';
                    const imgName = rows[i][2] ? rows[i][2].replace(/"/g, '').trim() : '';
                    
                    if(!name) continue;

                    const photoUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/${imgName}`;

                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100" onclick="window.open('https://wa.me/923485491217?text=Assalam-o-Alaikum, I want to buy: ${name}')">
                            <img src="${photoUrl}" class="w-full h-32 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=Wait+for+Update'">
                            <h4 class="text-[11px] font-bold text-gray-700 truncate">${name}</h4>
                            <p class="text-orange-600 font-black text-sm">Rs. ${price}</p>
                            <div class="mt-2 bg-orange-50 text-[8px] font-bold text-orange-600 py-1 text-center rounded border border-orange-100">ORDER NOW</div>
                        </div>`;
                }
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Network Error. Please refresh.";
            });
    </script>
</body>
</html>
