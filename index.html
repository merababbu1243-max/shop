<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | Mega Professional</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. DYNAMIC THEME SYSTEM --- */
        :root {
            --primary: #ff6801; /* Default Orange */
            --bg: #000000;
            --card: #141414;
            --text: #ffffff;
            --secondary: #25d366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; transition: 0.3s; }

        /* --- 2. HEADER & MENU --- */
        header { 
            background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 2000; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        
        /* Sidebar Menu */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: #111; z-index: 5000; transition: 0.4s; padding: 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; color: white; text-decoration: none; border-bottom: 1px solid #222; }

        /* Color Picker Option */
        .theme-box { margin-top: 20px; padding: 10px; background: #222; border-radius: 10px; }
        .color-circle { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; margin: 5px; border: 2px solid #fff; }

        /* --- 3. LIVE SEARCH --- */
        .search-box { 
            background: white; border-radius: 12px; display: flex; align-items: center; 
            padding: 10px 15px; margin-top: 15px; 
        }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 14px; }

        /* --- 4. PRODUCT GRID & TIMER --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .p-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; position: relative; }
        .p-card img { width: 100%; height: 160px; object-fit: contain; background: white; }
        
        /* Flash Sale Timer */
        .timer-tag { 
            position: absolute; top: 5px; left: 5px; background: rgba(255,0,0,0.8); 
            color: white; font-size: 10px; padding: 4px 8px; border-radius: 50px; font-weight: bold;
        }

        .p-info { padding: 10px; }
        .p-price { color: var(--primary); font-weight: 800; font-size: 18px; }

        /* --- 5. QR CODE & FOOTER --- */
        .footer { text-align: center; padding: 40px 20px; background: #080808; margin-top: 20px; border-top: 2px solid var(--primary); }
        .qr-frame { background: white; padding: 10px; display: inline-block; border-radius: 15px; margin-bottom: 15px; }

        /* --- 6. PAGES --- */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 6000; overflow-y: auto; }
        .page.active { display: block; }
        .page-header { background: var(--primary); padding: 20px; font-weight: bold; display: flex; align-items: center; gap: 15px; }

        /* Review Section */
        .rev-form { background: #111; padding: 20px; margin: 15px; border-radius: 15px; }
        .star-in { color: #444; font-size: 25px; margin-bottom: 15px; }
        .star-in i.active { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>ZAIN STORE</h2>
        <a href="#" class="menu-item" onclick="location.reload()"><i class="fas fa-home"></i> Home</a>
        <div class="theme-box">
            <p style="font-size: 12px; margin-bottom: 10px;">CHANGE APP COLOR:</p>
            <div class="color-circle" style="background: #ff6801;" onclick="changeTheme('#ff6801')"></div>
            <div class="color-circle" style="background: #e91e63;" onclick="changeTheme('#e91e63')"></div>
            <div class="color-circle" style="background: #2196f3;" onclick="changeTheme('#2196f3')"></div>
            <div class="color-circle" style="background: #9c27b0;" onclick="changeTheme('#9c27b0')"></div>
        </div>
        <a href="#" class="menu-item" style="margin-top:20px;"><i class="fas fa-info-circle"></i> About Us</a>
        <button onclick="toggleMenu()" style="width:100%; padding:10px; margin-top:20px; background:red; color:white; border:none; border-radius:5px;">CLOSE</button>
    </div>

    <header id="app-header">
        <div class="header-top">
            <i class="fas fa-bars" onclick="toggleMenu()" style="font-size: 22px;"></i>
            <b style="font-size: 20px;">ZAIN STORE</b>
            <i class="fas fa-shopping-bag"></i>
        </div>
        <div class="search-box">
            <i class="fas fa-search" style="color: #888;"></i>
            <input type="text" id="liveSearch" onkeyup="filterProducts()" placeholder="Live Search (e.g. Bra for girls)...">
        </div>
    </header>

    <div class="grid" id="productGrid"></div>

    <div class="footer">
        <div class="qr-frame">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://243-max.github.io" alt="QR Code">
        </div>
        <h3>SCAN TO SHOP</h3>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">100% Secure Shopping at Zain Store</p>
    </div>

    <div id="detail-page" class="page">
        <div class="page-header"><i class="fas fa-arrow-left" onclick="closePage()"></i> Product Details</div>
        <img id="d-img" style="width:100%; height:300px; object-fit:contain; background:white;">
        <div style="padding:20px;">
            <h2 id="d-name"></h2>
            <h1 id="d-price" style="color:var(--primary); margin:10px 0;"></h1>
            
            <div class="rev-form">
                <h4>Customer Reviews</h4>
                <div id="rev-list" style="margin-bottom: 20px;"></div>
                <div class="star-in" id="star-box">
                    <i class="fas fa-star" onclick="setStar(1)"></i>
                    <i class="fas fa-star" onclick="setStar(2)"></i>
                    <i class="fas fa-star" onclick="setStar(3)"></i>
                    <i class="fas fa-star" onclick="setStar(4)"></i>
                    <i class="fas fa-star" onclick="setStar(5)"></i>
                </div>
                <input type="text" id="u-name" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:none; border-radius:5px;">
                <textarea id="u-msg" placeholder="Write Review..." style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:5px;"></textarea>
                <input type="file" id="u-file" style="margin:10px 0;">
                <button onclick="submitReview()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">SUBMIT REVIEW</button>
            </div>
        </div>
    </div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/gviz/tq?tqx=out:csv';
        let allProducts = [];
        let rating = 0;

        async function init() {
            const res = await fetch(sheetURL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            allProducts = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { n: c[0].replace(/"/g,""), p: c[1].replace(/"/g,""), i: c[2].replace(/"/g,"") };
            });
            render(allProducts);
            startTimers();
        }

        function render(list) {
            document.getElementById('productGrid').innerHTML = list.map(p => `
                <div class="p-card" onclick="openDetail('${p.n.replace(/'/g,"\\'")}','${p.p}','${p.i}')">
                    <div class="timer-tag"><i class="fas fa-clock"></i> <span class="countdown">02:15:00</span></div>
                    <img src="${p.i}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-info">
                        <div style="font-size:12px; height:38px; overflow:hidden;">${p.n}</div>
                        <div class="p-price">Rs ${p.p}</div>
                    </div>
                </div>
            `).join('');
        }

        // Live Search Logic
        function filterProducts() {
            const q = document.getElementById('liveSearch').value.toLowerCase();
            render(allProducts.filter(x => x.n.toLowerCase().includes(q)));
        }

        // Theme Changer
        function changeTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
            localStorage.setItem('zain_theme', color);
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        // Flash Sale Timers
        function startTimers() {
            setInterval(() => {
                document.querySelectorAll('.countdown').forEach(el => {
                    let now = new Date();
                    let h = 23 - now.getHours();
                    let m = 59 - now.getMinutes();
                    let s = 59 - now.getSeconds();
                    el.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                });
            }, 1000);
        }

        // Detail & Review Logic
        function openDetail(n, p, i) {
            document.getElementById('d-name').innerText = n;
            document.getElementById('d-price').innerText = 'Rs ' + p;
            document.getElementById('d-img').src = i;
            document.getElementById('detail-page').classList.add('active');
            showReviews(n);
        }

        function closePage() { document.getElementById('detail-page').classList.remove('active'); }

        function setStar(n) {
            rating = n;
            document.querySelectorAll('#star-box i').forEach((s, i) => s.classList.toggle('active', i < n));
        }

        function submitReview() {
            const name = document.getElementById('u-name').value;
            const msg = document.getElementById('u-msg').value;
            const prod = document.getElementById('d-name').innerText;
            const file = document.getElementById('u-file').files[0];

            if(!name || !msg || rating === 0) return alert("Fill all fields!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const review = { name, msg, rating, prod, img: e.target ? e.target.result : null };
                let reviews = JSON.parse(localStorage.getItem('mega_revs') || '[]');
                reviews.push(review);
                localStorage.setItem('mega_revs', JSON.stringify(reviews));
                alert("Review Added!");
                showReviews(prod);
            };
            if(file) reader.readAsDataURL(file); else reader.onload({target:null});
        }

        function showReviews(pName) {
            const list = document.getElementById('rev-list');
            const reviews = JSON.parse(localStorage.getItem('mega_revs') || '[]');
            const filtered = reviews.filter(r => r.prod === pName);
            list.innerHTML = filtered.map(r => `
                <div style="background:#1a1a1a; padding:10px; margin-bottom:10px; border-radius:10px;">
                    <b>${r.name}</b> <br>
                    <div style="color:#f1c40f;">${'<i class="fas fa-star"></i>'.repeat(r.rating)}</div>
                    <p style="font-size:13px;">${r.msg}</p>
                    ${r.img ? `<img src="${r.img}" style="width:80px; height:80px; object-fit:cover; margin-top:5px; border-radius:5px;">` : ''}
                </div>
            `).join('');
        }

        // Apply saved theme
        const savedColor = localStorage.getItem('zain_theme');
        if(savedColor) changeTheme(savedColor);

        init();
    </script>
</body>
</html>
