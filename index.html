<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN STORE | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f4f9; font-family: 'Inter', sans-serif; }
        .bg-orange-main { background-color: #f85606; }
        .text-orange-main { color: #f85606; }
        .product-card { background: white; border-radius: 15px; transition: 0.3s; overflow: hidden; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <i class="fa fa-bars text-xl text-gray-700"></i>
        <h1 class="text-2xl font-black text-orange-main italic">ZAIN STORE</h1>
        <div class="relative"><i class="fa fa-shopping-bag text-2xl text-gray-600"></i></div>
    </header>

    <div class="p-4">
        <div class="bg-gradient-to-r from-orange-600 to-orange-400 rounded-2xl p-8 text-white text-center shadow-lg mb-6">
            <h2 class="text-3xl font-black italic uppercase">Official Store</h2>
            <p class="text-xs font-bold tracking-widest opacity-90 mt-2">QUALITY • TRUST • SERVICE</p>
        </div>

        <h3 class="font-bold text-gray-800 border-l-4 border-orange-600 pl-3 mb-4">FLASH SALE</h3>
        
        <div id="productGrid" class="grid grid-cols-2 gap-4">
            </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6" onclick="event.stopPropagation()">
            <img id="modalImg" src="" class="w-full h-64 object-contain mb-4">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-800"></h2>
            <p id="modalPrice" class="text-2xl font-black text-orange-600 my-2"></p>
            <button id="waBtn" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp text-xl"></i> ORDER ON WHATSAPP
            </button>
        </div>
    </div>

    <script>
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const user = 'merababbu1243-max';
        const repo = 'mera';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        fetch(sheetUrl).then(res => res.text()).then(data => {
            const rows = data.split('\n').slice(1);
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            rows.forEach(row => {
                const cols = row.split(',');
                const name = cols[0]?.replace(/"/g, '').trim();
                const price = cols[1]?.replace(/"/g, '').trim();
                const imgName = cols[2]?.replace(/"/g, '').trim();

                if (!name || !imgName) return;

                // Aapki file bahar hai, isliye hum 'shop/' folder nahi laga rahe
                const photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${imgName}`;

                grid.innerHTML += `
                    <div class="product-card shadow-sm p-3 border border-gray-100" onclick="openModal('${name}', '${price}', '${photoUrl}')">
                        <div class="h-32 flex items-center justify-center bg-gray-50 rounded-lg mb-2">
                            <img src="${photoUrl}" class="max-h-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=Wait+Refersh'">
                        </div>
                        <h4 class="text-xs font-bold text-gray-700 truncate">${name}</h4>
                        <p class="text-orange-600 font-black">Rs. ${price}</p>
                    </div>`;
            });
        });

        function openModal(name, price, img) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = 'Rs. ' + price;
            document.getElementById('modalImg').src = img;
            const msg = encodeURIComponent(`Assalam-o-Alaikum, I want to order ${name} for Rs. ${price}`);
            document.getElementById('waBtn').onclick = () => window.open(`https://wa.me/923485491217?text=${msg}`);
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
