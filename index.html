<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Tech Hub - Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f4f4f4; font-family: sans-serif; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-whatsapp { background-color: #25D366; color: white; font-weight: bold; transition: 0.3s; text-decoration: none; display: block; }
        .btn-whatsapp:hover { background-color: #128C7E; }
    </style>
</head>
<body>

    <header class="bg-black text-white text-center py-6 shadow-lg">
        <h1 class="text-3xl font-bold tracking-widest uppercase">Zain Tech Hub</h1>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="product-card p-4 flex flex-col items-center text-center">
                <img src="20260312_083356.jpg" alt="Crown H30 Smartwatch" class="w-full h-64 object-contain mb-4">
                <h2 class="text-xl font-semibold text-gray-800">Crown H30 Smartwatch</h2>
                <p class="text-gray-500 text-sm mb-4 italic">7+1 Seven In One | Ultra 2 Series</p>
                <p class="text-2xl font-bold text-green-600 mb-6 font-mono">PKR 2,500</p>
                <a href="https://wa.me/923485491217?text=Hi, I want to order Crown H30 Smartwatch" class="btn-whatsapp w-full py-3 rounded-full text-center">
                    Order on WhatsApp
                </a>
            </div>

            <div class="product-card p-4 flex flex-col items-center text-center">
                <img src="buds.jpg" alt="Wireless Buds Pro" class="w-full h-64 object-contain mb-4 bg-gray-100 rounded">
                <h2 class="text-xl font-semibold text-gray-800">Wireless Buds Pro</h2>
                <p class="text-gray-500 text-sm mb-4 italic">Premium Sound Quality</p>
                <p class="text-2xl font-bold text-green-600 mb-6 font-mono">PKR 12,500</p>
                <a href="https://wa.me/923485491217?text=Hi, I want to order Wireless Buds Pro" class="btn-whatsapp w-full py-3 rounded-full text-center">
                    Order on WhatsApp
                </a>
            </div>

        </div>
    </main>

    <footer class="text-center py-10 text-gray-400 text-sm">
        &copy; 2026 Zain Tech Hub. All Rights Reserved.
    </footer>

</body>
</html>
