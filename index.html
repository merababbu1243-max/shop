!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUNNY TOONS Electronics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; padding-bottom: 80px; }
        .nav { background: #232f3e; color: white; padding: 15px; text-align: center; font-size: 22px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
        .product { background: white; border-radius: 10px; padding: 15px; margin: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 40%; }
        .product img { width: 100%; height: 120px; object-fit: contain; }
        .price { color: #B12704; font-size: 18px; font-weight: bold; }
        .buy-btn { background: #ffd814; border: 1px solid #fcd200; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Cart Bar */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 2px solid #ddd; padding: 15px; display: flex; justify-content: space-around; align-items: center; font-weight: bold; }
        .order-btn { background: #25D366; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>

<div class="nav">Funny Tone Electronics ⚡</div>

<div class="container">
    <div class="product">
        <img src="https://img.icons8.com/fluency/200/headset.png" alt="Headphones">
        <h3>Wireless Headset</h3>
        <p class="price">Rs. 2,500</p>
        <button class="buy-btn" onclick="addToCart('Headset', 2500)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://img.icons8.com/fluency/200/smartwatch.png" alt="Watch">
        <h3>Smart Watch</h3>
        <p class="price">Rs. 4,000</p>
        <button class="buy-btn" onclick="addToCart('Smart Watch', 4000)">Add to Cart</button>
    </div>
</div>

<div class="cart-bar">
    <div>Total: Rs. <span id="total">0</span></div>
    <a href="#" class="order-btn" onclick="sendWhatsApp()">Order on WhatsApp</a>
</div>

<script>
    let total = 0;
    let items = [];

    function addToCart(name, price) {
        total += price;
        items.push(name);
        document.getElementById('total').innerText = total;
        alert(name + " added to cart!");
    }

    function sendWhatsApp() {
        if (total === 0) {
            alert("Pehle kuch select karein!");
            return;
        }
        let phone = "923XXXXXXXXX"; // <-- Yahan apna WhatsApp number likhein
        let message = "Assalam-o-Alaikum, mujhe ye items order karne hain: " + items.join(", ") + ". Total Bill: Rs. " + total;
        window.open("https://wa.me/" + phone + "?text=" + encodeURIComponent(message));
    }
</script>

</body>
</html>
