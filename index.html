<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store | Professional Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #eff0f5; font-family: sans-serif; }
        .daraz-orange { color: #f85606; }
        .daraz-bg-orange { background-color: #f85606; }
        .category-chip:hover { color: #f85606; cursor: pointer; }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 border-b shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <div class="text-2xl font-bold daraz-orange italic">ZAIN STORE</div>
            
            <div class="flex-1 hidden md:block">
                <div class="relative">
                    <input type="text" placeholder="Search in Zain Store" class="w-full bg-gray-100 py-2 px-4 rounded-md outline-none border focus:border-orange-500">
                    <button class="absolute right-3 top-2 text-gray-400"><i class="fa fa-search"></i></button>
                </div>
            </div>

            <div class="flex items-center gap-5 text-gray-600">
                <div class="relative cursor-pointer" onclick="alert('Cart is empty!')">
                    <i class="fa fa-shopping-cart text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] rounded-full px-1.5 font-bold">0</span>
                </div>
                <i class="fa fa-user text-xl cursor-pointer"></i>
            </div>
        </div>
        
        <div class="bg-white border-t overflow-x-auto whitespace-nowrap px-4 py-2 text-sm text-gray-600">
            <div class="max-w-6xl mx-auto flex gap-6">
                <span class="category-chip font-bold daraz-orange">All Categories</span>
                <span class="category-chip text-orange-500 underline">Smart Watches</span>
                <span class="category-chip">Wireless Buds</span>
                <span class="category-chip">Mobile Acc.</span>
                <span class="category-chip">Fashion</span>
                <span class="category-chip">Electronics</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        
        <div class="w-full h-32 md:h-64 bg-gradient-to-r from-orange-400 to-red-500 rounded-lg mb-6 flex items-center justify-center text-white text-2xl font-bold italic shadow-inner">
            MEGA EID SALE - UP TO 50% OFF
        </div>

        <h2 class="text-lg font-bold text-gray-800 mb-4 uppercase">Flash Sale</h2>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
            
            <div class="bg-white rounded-sm shadow-sm hover:shadow-md transition p-2 flex flex-col border border-transparent hover:border-orange-500">
                <div class="relative pt-[100%] border-b border-gray-100">
                    <img src="20260312_083356.jpg" class="absolute top-0 left-0 w-full h-full object-contain p-2">
                </div>
                <div class="p-1 mt-2">
                    <h3 class="text-xs text-gray-700 h-8 overflow-hidden">Crown H30 Smartwatch Ultra 2 Series - 7+1 Straps</h3>
                    <div class="mt-2">
                        <span class="daraz-orange text-lg font-bold">Rs. 2,500</span>
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] text-gray-400 line-through">Rs. 4,500</span>
                            <span class="text-[10px] text-gray-800">-44%</span>
                        </div>
                    </div>
                    
                    <div class="mt-3 space-y-2">
                        <button onclick="updateCart()" class="w-full border border-orange-500 daraz-orange py-1 rounded-sm text-[11px] font-bold hover:bg-orange-50">
                            ADD TO CART
                        </button>
                        <a href="https://wa.me/923485491217?text=I want to buy Crown H30" 
                           class="w-full daraz-bg-orange text-white text-center block py-2 rounded-sm text-xs font-bold shadow-md hover:opacity-90">
                            BUY NOW
                        </a>
                    </div>
                </div>
            </div>

            </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <a href="https://wa.me/923485491217?text=Hello Zain Store! I need help." class="bg-green-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-3xl hover:scale-110 transition-transform">
            <i class="fab fa-whatsapp"></i>
        </a>
        <div class="bg-white text-[10px] absolute -top-8 -left-12 px-2 py-1 rounded shadow-md border text-gray-600 font-bold whitespace-nowrap animate-bounce">
            Chat with us!
        </div>
    </div>

    <script>
        let count = 0;
        function updateCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert('Item added to cart!');
        }
    </script>

</body>
</html>
