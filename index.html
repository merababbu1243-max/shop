<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <header class="bg-white p-4 shadow-sm text-center sticky top-0 z-50">
        <h1 class="text-2xl font-black text-orange-600 italic tracking-tighter">ZAIN STORE</h1>
    </header>

    <main class="p-4">
        <div class="bg-orange-500 rounded-2xl p-6 text-white text-center mb-6 shadow-md">
            <h2 class="text-xl font-bold uppercase">Our Products</h2>
            <p class="text-[10px] opacity-80 uppercase tracking-widest mt-1">Direct from Google Sheets</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4">
            <p id="msg" class="col-span-2 text-center py-10 text-gray-400 italic">Checking inventory...</p>
        </div>
    </main>

    <script>
        // Aapka Sahi Data
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const githubUser = 'merababbu1243-max';
        const repoName = 'mera';
        
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substring(47).slice(0, -2));
                const rows = json.table.rows;
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; 

                rows.forEach((row, i) => {
                    if (i === 0) return; // Header row skip karein
                    
                    const name = row.c[0] ? row.c[0].v : 'New Product';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const imgName = row.c[2] ? row.c[2].v : '';
                    
                    // GitHub se photo ka link
                    const photoUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/${imgName}`;

                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100" onclick="window.open('https://wa.me/923485491217?text=Assalam-o-Alaikum Zain Store, I want to buy: ${name}')">
                            <div class="h-32 flex items-center justify-center bg-gray-50 rounded-lg mb-2 overflow-hidden">
                                <img src="${photoUrl}" class="max-h-full max-w-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=Wait+for+Refresh'">
                            </div>
                            <h4 class="text-[10px] font-bold text-gray-700 uppercase truncate">${name}</h4>
                            <p class="text-orange-600 font-black text-sm mt-1">Rs. ${price}</p>
                            <div class="w-full bg-orange-50 text-[8px] font-bold text-orange-600 py-1 text-center rounded mt-2 border border-orange-100">ORDER ON WHATSAPP</div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Error loading data. Check Sheet access.";
            });
    </script>
</body>
</html>
