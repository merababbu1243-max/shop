<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Tech Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; text-align: center; margin: 0; padding: 0; }
        .header { background: #1a1a1a; color: white; padding: 25px; font-size: 26px; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 300px; overflow: hidden; }
        .img-box { width: 100%; height: 250px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; }
        .title { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .price { font-size: 24px; color: #2ecc71; font-weight: bold; margin-bottom: 20px; }
        .wa-btn { display: inline-block; background: #25d366; color: white; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; width: 80%; transition: 0.3s; }
        .wa-btn:hover { background: #1ebe57; }
    </style>
</head>
<body>

<div class="header">ZAIN TECH HUB</div>

<div class="container">
    <div class="card">
        <div class="img-box">
            <img src="buds.jpg" alt="Wireless Buds">
        </div>
        <div class="info">
            <div class="title">Wireless Buds Pro</div>
            <div class="price">PKR 12,500</div>
            <a href="https://wa.me/923485491217?text=Salam! Mujhe ye Buds chahiye" class="wa-btn">Order on WhatsApp</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="mobile.jpg" alt="Smart Phone">
        </div>
        <div class="info">
            <div class="title">Smart Phone Ultra</div>
            <div class="price">PKR 95,000</div>
            <a href="https://wa.me/923485491217?text=Salam! Mujhe ye Phone chahiye" class="wa-btn">Order on WhatsApp</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="watch.jpg" alt="Smart Watch">
        </div>
        <div class="info">
            <div class="title">Smart Watch 8</div>
            <div class="price">PKR 8,000</div>
            <a href="https://wa.me/923485491217?text=Salam! Mujhe ye Watch chahiye" class="wa-btn">Order on WhatsApp</a>
        </div>
    </div>
</div>

</body>
</html>
