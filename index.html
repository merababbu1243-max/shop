<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Tech Hub | Official Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; text-align: center; }
        .header { background: #1a1a1a; color: #fff; padding: 30px; font-size: 28px; font-weight: bold; letter-spacing: 2px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .card { background: #fff; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); overflow: hidden; width: 300px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .img-box { width: 100%; height: 250px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; }
        .title { font-size: 20px; font-weight: 600; color: #333; margin: 10px 0; }
        .price { font-size: 24px; color: #2ecc71; font-weight: bold; margin-bottom: 15px; }
        .wa-btn { display: inline-block; background: #25d366; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>

<div class="header">ZAIN TECH HUB</div>

<div class="container">
    <div class="card">
        <div class="img-box">
            <img src="1773204853955684682.jpg" alt="Product">
        </div>
        <div class="info">
            <div class="title">Smart Phone Pro</div>
            <div class="price">PKR 95,000</div>
            <a href="https://wa.me/aapka_number" class="wa-btn">Order on WhatsApp</a>
        </div>
    </div>

    <div class="card">
        <div class="img-box">
            <img src="1773205165922253326.jpg" alt="Product">
        </div>
        <div class="info">
            <div class="title">Wireless Headphones</div>
            <div class="price">PKR 12,500</div>
            <a href="https://wa.me/aapka_number" class="wa-btn">Order on WhatsApp</a>
        </div>
    </div>
</div>

</body>
</html>
