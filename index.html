<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zain Store</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #ff6a00;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Slider */
.slider {
  width: 100%;
  overflow: hidden;
}

.slider img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  animation: slide 15s infinite;
}

@keyframes slide {
  0% {opacity:1;}
  33% {opacity:1;}
  40% {opacity:0;}
  60% {opacity:0;}
  66% {opacity:1;}
  100% {opacity:1;}
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.categories button {
  padding: 10px 15px;
  border: none;
  background: #eee;
  border-radius: 10px;
  cursor: pointer;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  color: orange;
  font-weight: bold;
}

button.buy {
  background: orange;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>Zain Store</header>

<!-- Slider -->
<div class="slider">
  <img src="https://picsum.photos/400/200?1">
</div>

<!-- Categories -->
<div class="categories">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('gadgets')">Gadgets</button>
  <button onclick="filterCategory('beauty')">Beauty</button>
</div>

<!-- Products -->
<div class="products" id="products"></div>

<script>
const sheetURL = "https://opensheet.elk.sh/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/Sheet1";

const baseURL = "https://raw.githubusercontent.com/merababbu1243-max/shop/main/";

let allProducts = [];

// ✅ Image function (auto detect)
function getImageUrl(image) {
  if (!image) return "";
  image = image.trim();

  if (image.startsWith("http")) {
    return image;
  }

  return baseURL + image;
}

// Fetch data
fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    showProducts(data);
  });

// Show products
function showProducts(data) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${getImageUrl(item.image)}">
      <h3>${item.name}</h3>
      <p class="price">Rs ${item.price}</p>
      <button class="buy">Add To Cart</button>
    `;

    container.appendChild(div);
  });
}

// Filter
function filterCategory(cat) {
  if (cat === "all") {
    showProducts(allProducts);
  } else {
    const filtered = allProducts.filter(p => 
      p.name.toLowerCase().includes(cat)
    );
    showProducts(filtered);
  }
}
</script>

</body>
</html>
