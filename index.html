<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f7f7fa; font-family: sans-serif; padding-bottom: 80px; }
        .daraz-orange { color: #f85606; }
        .side-menu { position: fixed; inset-y: 0; left: 0; width: 260px; background: white; z-index: 2000; transform: translateX(-100%); transition: 0.3s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        .side-menu.active { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; }
        .overlay.active { display: block; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div id="sideMenu" class="side-menu">
        <div class="bg-orange-600 p-6 text-white text-center">
            <div class="w-16 h-16 bg-white rounded-full mx-auto mb-2 flex items-center justify-center text-orange-600 text-2xl font-bold italic">Z</div>
            <p class="font-bold">Zain Store Official</p>
        </div>
        <div class="p-4 space-y-4">
            <div onclick="location.reload()" class="flex items-center gap-3 text-gray-700 border-b pb-2"><i class="fa fa-home"></i> Home</div>
            <div onclick="window.open('https://wa.me/923485491217')" class="flex items-center gap-3 text-green-600 font-bold border-b pb-2"><i class="fab fa-whatsapp"></i> Contact Us</div>
        </div>
    </div>

    <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-xl text-gray-600"><i class="fa fa-bars"></i></button>
            <h1 class="text-2xl font-black daraz-orange italic tracking-tighter uppercase">ZAIN STORE</h1>
        </div>
        <i class="fa fa-shopping-cart text-gray-500 text-xl"></i>
    </header>

    <main class="p-4">
        <div class="bg-gradient-to-r from-orange-500 to-red-600 rounded-2xl p-6 text-white text-center mb-6 shadow-lg">
            <h2 class="text-2xl font-bold uppercase tracking-tight">Official Shop</h2>
            <p class="text-[10px] opacity-90">Google Sheets Managed Inventory</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4 text-center">
            <p class="col-span-2 text-gray-400 py-10">Loading Products...</p>
        </div>
    </main>

    <footer class="bg-black text-white p-8 mt-10 text-center rounded-t-3xl">
        <h3 class="text-orange-500 font-black italic mb-2">ZAIN STORE</h3>
        <p class="text-[10px] text-gray-500 mb-4 tracking-widest">PAYMENT: 03485491217</p>
        <div class="flex justify-center gap-4 opacity-30">
            <i class="fa fa-truck text-xl"></i>
            <i class="fa fa-shield-alt text-xl"></i>
        </div>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- GOOGLE SHEETS LOGIC ---
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const base = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        fetch(base)
            .then(res => res.text())
            .then(data => {
                const temp = data.substring(47).slice(0, -2);
                const json = JSON.parse(temp);
                const rows = json.table.rows;
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; // Clear loading text

                rows.forEach((row, index) => {
                    if(index === 0) return; // Skip headers
                    
                    const name = row.c[0] ? row.c[0].v : 'Product';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const img = row.c[2] ? row.c[2].v : '';
                    const desc = row.c[4] ? row.c[4].v : '';

                    const card = `
                        <div class="product-card p-3" onclick="window.open('https://wa.me/923485491217?text=Order: ${name}')">
                            <img src="${img}" class="w-full h-32 object-contain mb-2">
                            <h4 class="text-[11px] font-bold text-gray-700">${name}</h4>
                            <p class="text-orange-600 font-black text-sm">Rs. ${price}</p>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            });
    </script>
</body>
</html>
