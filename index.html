
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f7f7fa; font-family: 'Inter', sans-serif; padding-bottom: 70px; overflow-x: hidden; }
        .daraz-orange { color: #f85606; }
        .bg-daraz { background-color: #f85606; }
        .side-menu { position: fixed; inset-y: 0; left: 0; width: 280px; background: white; z-index: 2000; transform: translateX(-100%); transition: 0.3s; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
        .side-menu.active { transform: translateX(0); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500; backdrop-filter: blur(3px); }
        .overlay.active { display: block; }
        .hero-banner { background: linear-gradient(135deg, #f85606 0%, #ff8c00 100%); border-radius: 0 0 25px 25px; padding: 40px 20px; color: white; text-align: center; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        #detailModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>
    <div id="sideMenu" class="side-menu">
        <div class="bg-daraz p-8 text-white text-center">
            <div class="w-20 h-20 bg-white rounded-full mx-auto mb-3 flex items-center justify-center text-orange-600 text-4xl font-black">Z</div>
            <p class="font-bold text-lg">Zain Store Official</p>
        </div>
        <div class="p-5 space-y-5 font-bold text-gray-700">
            <div onclick="toggleMenu()" class="border-b pb-3"><i class="fa fa-home text-orange-500 mr-2"></i> Home</div>
            <div onclick="window.open('https://wa.me/923485491217')" class="text-green-600 border-b pb-3"><i class="fab fa-whatsapp mr-2"></i> WhatsApp Support</div>
        </div>
    </div>

    <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <button onclick="toggleMenu()" class="text-2xl text-gray-700"><i class="fa fa-bars-staggered"></i></button>
        <h1 class="text-2xl font-black daraz-orange italic uppercase">ZAIN STORE</h1>
        <i class="fa fa-shopping-bag text-gray-600 text-2xl"></i>
    </header>

    <section class="hero-banner mb-6 shadow-xl">
        <h2 class="text-3xl font-black mb-1 italic uppercase text-white">Official Store</h2>
        <p class="text-[10px] font-bold opacity-80 tracking-[4px] uppercase">Quality • Trust • Service</p>
    </section>

    <main class="px-4">
        <div class="flex justify-between items-center mb-6 border-l-4 border-orange-500 pl-3">
            <h3 class="font-black text-gray-800 uppercase tracking-tight">Flash Sale</h3>
            <span class="text-[10px] font-bold text-orange-500 animate-pulse italic">LIVE NOW</span>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div id="detailModal">
        <div class="bg-white w-full max-w-sm rounded-[30px] p-6 relative">
            <button onclick="closeDetail()" class="absolute top-5 right-5 text-gray-300 text-2xl"><i class="fa fa-times-circle"></i></button>
            <img id="modalImg" src="" class="w-full h-52 object-contain mb-4">
            <h2 id="modalTitle" class="text-xl font-bold mb-1"></h2>
            <p id="modalPrice" class="text-2xl font-black text-orange-600 mb-4"></p>
            <button id="modalBtn" class="w-full bg-green-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2">
                <i class="fab fa-whatsapp"></i> ORDER ON WHATSAPP
            </button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const user = 'merababbu1243-max';
        const repo = 'mera';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        fetch(url).then(res => res.text()).then(csv => {
            const rows = csv.split('\n').map(r => r.split(','));
            const grid = document.getElementById('productGrid');
            grid.innerHTML = ''; 

            for (let i = 1; i < rows.length; i++) {
                const name = rows[i][0]?.replace(/"/g, '');
                const price = rows[i][1]?.replace(/"/g, '');
                const img = rows[i][2]?.replace(/"/g, '').trim();
                
                if(!name) continue;

                // FIX: 'shop/' folder add kiya hai kyunke aapki images wahan hain
                const photoUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/shop/${img}`;

                grid.innerHTML += `
                    <div class="product-card p-3 shadow-sm border border-gray-100 text-center" onclick="openDetail('${name}', '${price}', '${photoUrl}')">
                        <img src="${photoUrl}" class="w-full h-32 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=Wait+Refresh'">
                        <h4 class="text-[11px] font-bold text-gray-700 truncate">${name}</h4>
                        <p class="text-orange-600 font-black text-sm">Rs. ${price}</p>
                    </div>`;
            }
        });

        function openDetail(name, price, img) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = 'Rs. ' + price;
            document.getElementById('modalImg').src = img;
            const msg = encodeURIComponent(`Assalam-o-Alaikum Zain Store, I want to order: ${name} (Rs. ${price})`);
            document.getElementById('modalBtn').setAttribute("onclick", `window.open('https://wa.me/923485491217?text=${msg}')`);
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
    </script>
</body>
</html>
