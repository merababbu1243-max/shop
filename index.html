<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a32cc4; --bg: #000; --card: #121212; --text: #fff; --success: #2ecc71; --accent: #f39c12; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; }

        /* Timer Styling */
        .timer-box { background: linear-gradient(45deg, #1a1a1a, #000); border: 1px solid var(--primary); border-radius: 15px; padding: 15px; text-align: center; margin: 15px 0; }
        #timer { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: 2px; }

        /* Review Section */
        .review-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #333; }
        .stars { color: var(--accent); margin-bottom: 10px; font-size: 18px; }
        .upload-btn { width: 100%; padding: 12px; background: #1a1a1a; border: 2px dashed #444; color: #ccc; border-radius: 10px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Header & Common UI */
        header { background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 2000; border-radius: 0 0 20px 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .img-box { height: 150px; background: #fff; display: flex; align-items: center; justify-content: center; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        
        .input-style { width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 12px; outline: none; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px; border-top: 2px solid var(--primary); z-index: 4000; }
        .nav-item { color: #888; text-align: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fas fa-bars"></i>
            <b style="font-size:18px;">ZAIN STORE</b>
            <i class="fas fa-shopping-bag"></i>
        </div>
        <div style="background:#fff; border-radius:10px; display:flex; padding:8px 15px; margin-top:10px;">
            <input type="text" id="mainSearch" onkeyup="render()" placeholder="Search Products..." style="border:none; outline:none; width:100%;">
        </div>
    </header>

    <div id="home-page" class="page active" style="padding:15px;">
        <div class="timer-box">
            <p style="color:var(--primary); font-size:12px; font-weight:bold; text-transform:uppercase;">Flash Sale Ending In</p>
            <div id="timer">00:00:00</div>
        </div>

        <div class="grid" id="productGrid"></div>
        
        <div style="text-align:center; padding:40px 20px; border-top:1px solid #222; margin-top:30px; background:#080808;">
            <div style="background:#fff; padding:10px; display:inline-block; border-radius:15px;">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://243-max.github.io" style="display:block;">
            </div>
            <p style="margin-top:15px; font-weight:bold; color:var(--primary);">ZAIN STORE | RAWALPINDI</p>
            <p style="font-size:11px; color:#666; margin-top:5px;"><i class="fas fa-map-marker-alt"></i> Shop #4, Main Bazar, Rawalpindi</p>
        </div>
    </div>

    <div id="detail-page" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:8000; background:#000; overflow-y:auto; display:none;">
        <div style="background:var(--primary); padding:15px; display:flex; align-items:center; gap:15px; position:sticky; top:0;">
            <i class="fas fa-arrow-left" onclick="closeDetail()"></i> <b>Product Details</b>
        </div>
        <img id="d-img" style="width:100%; height:320px; object-fit:contain; background:#fff;">
        
        <div style="padding:20px;">
            <h2 id="d-name"></h2>
            <h1 id="d-price" style="color:var(--primary); margin:10px 0;"></h1>
            <p style="color:#888; font-size:13px; margin-bottom:20px;">Delivery: 2-4 Days | Verified Product</p>

            <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:25px;">
                <h4 style="margin-bottom:15px; color:var(--primary);">Shipping Details</h4>
                <input type="text" id="c-name" class="input-style" placeholder="Full Name">
                <input type="number" id="c-phone" class="input-style" placeholder="WhatsApp Number">
                <textarea id="c-addr" class="input-style" placeholder="Complete Address" style="height:80px;"></textarea>
                <button onclick="sendOrder()" style="width:100%; padding:18px; background:var(--success); color:#fff; border:none; border-radius:12px; font-weight:bold; font-size:16px;">
                    <i class="fab fa-whatsapp"></i> CONFIRM VIA WHATSAPP
                </button>
            </div>

            <div class="review-section">
                <h3 style="margin-bottom:15px;">Customer Reviews & Ratings</h3>
                <div class="stars">
                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
                    <span style="color:#888; font-size:12px; margin-left:10px;">(No reviews yet)</span>
                </div>
                
                <input type="text" class="input-style" placeholder="Your Name">
                <textarea class="input-style" placeholder="How was your experience?" style="height:100px;"></textarea>
                
                <div class="upload-btn">
                    <i class="fas fa-cloud-upload-alt"></i> Add Photo from Gallery
                </div>
                
                <button style="width:100%; padding:14px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-weight:bold;">SUBMIT YOUR REVIEW</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item"><i class="fas fa-dharmachakra"></i><br>Spin</div>
        <div class="nav-item"><i class="fas fa-wallet"></i><br>Pay</div>
        <div class="nav-item"><i class="fas fa-undo"></i><br>Help</div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/gviz/tq?tqx=out:csv';
        let products = [];

        async function init() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                products = rows.map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { n: c[0].replace(/"/g,""), p: c[1].replace(/"/g,""), i: c[2].replace(/"/g,"") };
                });
                render();
                startTimer(18 * 3600); // 18 Hours timer
            } catch(e) { console.log("Error loading data"); }
        }

        function render() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="card" onclick="openDetail('${p.n.replace(/'/g,"\\'")}','${p.p}','${p.i}')">
                    <div class="img-box"><img src="${p.i}"></div>
                    <div style="padding:12px;">
                        <div style="font-size:11px; height:32px; overflow:hidden;">${p.n}</div>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">Rs ${p.p}</div>
                        <div style="font-size:10px; color:var(--accent); margin-top:4px;">
                            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i> (14)
                        </div>
                    </div>
                </div>`).join('');
        }

        function startTimer(duration) {
            let timer = duration, hours, minutes, seconds;
            setInterval(() => {
                hours = Math.floor(timer / 3600);
                minutes = Math.floor((timer % 3600) / 60);
                seconds = Math.floor(timer % 60);
                document.getElementById('timer').textContent = 
                    (hours < 10 ? "0" + hours : hours) + ":" + 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                    (seconds < 10 ? "0" + seconds : seconds);
                if (--timer < 0) timer = duration;
            }, 1000);
        }

        function openDetail(n, p, i) {
            document.getElementById('d-name').innerText = n;
            document.getElementById('d-price').innerText = 'Rs ' + p;
            document.getElementById('d-img').src = i;
            document.getElementById('detail-page').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closeDetail() { document.getElementById('detail-page').style.display = 'none'; }

        function sendOrder() {
            const n = document.getElementById('d-name').innerText;
            const p = document.getElementById('d-price').innerText;
            const cN = document.getElementById('c-name').value;
            const cP = document.getElementById('c-phone').value;
            const cA = document.getElementById('c-addr').value;
            if(!cN || !cP || !cA) return alert("Please fill all details!");
            const msg = `*ZAIN STORE ORDER*%0A📦*Item:* ${n}%0A💰*Price:* ${p}%0A👤*Name:* ${cN}%0A📞*Phone:* ${cP}%0A📍*Addr:* ${cA}`;
            window.location.href = `https://wa.me/923485491217?text=${msg}`;
        }

        init();
    </script>
</body>
</html>
