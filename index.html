<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | Add Reviews Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff6801; --bg: #000000; --card: #161616; --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* --- Header & Search --- */
        header { background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; }
        .search-bar { background: white; border-radius: 10px; display: flex; align-items: center; padding: 10px; margin-top: 10px; }
        .search-bar input { border: none; outline: none; width: 100%; margin-left: 10px; color: #333; }

        /* --- Product Grid --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .p-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .p-card img { width: 100%; height: 160px; object-fit: cover; background: #fff; }
        .p-info { padding: 10px; }
        .p-price { color: var(--primary); font-weight: 800; font-size: 18px; margin-top: 5px; }

        /* --- Full Page System --- */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; overflow-y: auto; }
        .page.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .page-header { background: var(--primary); padding: 18px; display: flex; align-items: center; gap: 15px; font-weight: bold; position: sticky; top: 0; }

        /* --- ⭐ RATING & REVIEW FORM --- */
        .review-container { padding: 20px; background: #111; margin: 15px; border-radius: 15px; border: 1px solid #222; }
        .stars-input { color: #555; font-size: 28px; margin: 15px 0; display: flex; gap: 10px; }
        .stars-input i.active { color: #f1c40f; }
        
        .rev-input-field { width: 100%; padding: 12px; margin-bottom: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; font-size: 14px; }
        .upload-btn { background: #333; color: #bbb; padding: 12px; border-radius: 10px; width: 100%; text-align: center; border: 1.5px dashed #555; margin-bottom: 15px; position: relative; }
        .upload-btn input { position: absolute; opacity: 0; width: 100%; height: 100%; left: 0; top: 0; cursor: pointer; }
        
        .submit-rev { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(255,104,1,0.3); }

        /* Review List */
        .rev-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid var(--primary); }
        .rev-img-prev { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: block; }

        /* Bottom Action */
        .footer-action { position: fixed; bottom: 0; width: 100%; display: flex; height: 70px; z-index: 6000; }
        .btn-cart { flex: 1; background: #333; color: white; border: none; font-weight: bold; }
        .btn-buy { flex: 1; background: var(--primary); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:22px;">ZAIN STORE</b>
            <i class="fas fa-shopping-bag" onclick="openPage('cart-page')" style="font-size:22px;"></i>
        </div>
        <div class="search-bar">
            <i class="fas fa-search" style="color:#999;"></i>
            <input type="text" id="liveSearch" onkeyup="search()" placeholder="Search Products (Live Filter)...">
        </div>
    </header>

    <div class="grid" id="productGrid"></div>

    <div id="detail-page" class="page">
        <div class="page-header"><i class="fas fa-arrow-left" onclick="closePage('detail-page')"></i> Back</div>
        <img id="d-img" style="width:100%; height:320px; object-fit:contain; background:white;">
        
        <div style="padding:20px;">
            <h2 id="d-name"></h2>
            <h1 id="d-price" style="color:var(--primary); margin:10px 0;"></h1>
            <p style="color:#888; font-size:14px;">Free Delivery | 7 Days Warranty | Original Product</p>
            
            <hr style="border:0.5px solid #222; margin:25px 0;">

            <div class="review-container">
                <h3 style="margin-bottom:5px;">Customer Reviews</h3>
                <p style="font-size:12px; color:#666;">Be the first to share your experience!</p>
                
                <div id="rev-list"></div>

                <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;">
                    <h4>Write your review</h4>
                    <div class="stars-input" id="star-box">
                        <i class="fas fa-star" onclick="setRating(1)"></i>
                        <i class="fas fa-star" onclick="setRating(2)"></i>
                        <i class="fas fa-star" onclick="setRating(3)"></i>
                        <i class="fas fa-star" onclick="setRating(4)"></i>
                        <i class="fas fa-star" onclick="setRating(5)"></i>
                    </div>
                    <input type="text" id="u-name" class="rev-input-field" placeholder="Full Name">
                    <textarea id="u-msg" class="rev-input-field" rows="3" placeholder="What do you think about this product?"></textarea>
                    
                    <div class="upload-btn">
                        <i class="fas fa-camera"></i> <span id="file-label">Add Product Photo</span>
                        <input type="file" id="u-file" accept="image/*" onchange="updateFileName()">
                    </div>
                    
                    <button class="submit-rev" onclick="postReview()">SUBMIT REVIEW</button>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="btn-cart">ADD TO CART</button>
            <button class="btn-buy" id="order-wa">ORDER NOW</button>
        </div>
    </div>

    <div id="cart-page" class="page">
        <div class="page-header"><i class="fas fa-arrow-left" onclick="closePage('cart-page')"></i> Your Cart</div>
        <div style="text-align:center; padding-top:100px; color:#555;">No items in cart yet.</div>
    </div>

    <script>
        const csvURL = 'https://docs.google.com/spreadsheets/d/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/gviz/tq?tqx=out:csv';
        let products = [];
        let userRating = 0;

        async function init() {
            const res = await fetch(csvURL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            products = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { n: c[0].replace(/"/g,""), p: c[1].replace(/"/g,""), i: c[2].replace(/"/g,"") };
            });
            render(products);
        }

        function render(list) {
            document.getElementById('productGrid').innerHTML = list.map(p => `
                <div class="p-card" onclick="openDetail('${p.n.replace(/'/g,"\\'")}','${p.p}','${p.i}')">
                    <img src="${p.i}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-info">
                        <div style="font-size:13px; height:38px; overflow:hidden;">${p.n}</div>
                        <div class="p-price">Rs ${p.p}</div>
                    </div>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('liveSearch').value.toLowerCase();
            render(products.filter(x => x.n.toLowerCase().includes(q)));
        }

        function setRating(n) {
            userRating = n;
            const stars = document.querySelectorAll('#star-box i');
            stars.forEach((s, i) => s.classList.toggle('active', i < n));
        }

        function updateFileName() {
            const f = document.getElementById('u-file').files[0];
            if(f) document.getElementById('file-label').innerText = "Photo Attached!";
        }

        function postReview() {
            const name = document.getElementById('u-name').value;
            const msg = document.getElementById('u-msg').value;
            const prod = document.getElementById('d-name').innerText;
            const file = document.getElementById('u-file').files[0];

            if(!name || !msg || userRating == 0) return alert("Please fill Name, Comment and Rating!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const review = { name, msg, rating: userRating, product: prod, img: e.target ? e.target.result : null };
                let reviews = JSON.parse(localStorage.getItem('zain_store_reviews') || '[]');
                reviews.push(review);
                localStorage.setItem('zain_store_reviews', JSON.stringify(reviews));
                alert("Review Added Successfully! 🎉");
                location.reload(); 
            };
            if(file) reader.readAsDataURL(file);
            else reader.onload({target: null});
        }

        function displayReviews(pName) {
            const list = document.getElementById('rev-list');
            const reviews = JSON.parse(localStorage.getItem('zain_store_reviews') || '[]');
            const filtered = reviews.filter(r => r.product === pName);
            
            if(filtered.length === 0) {
                list.innerHTML = "<p style='color:#555;'>No reviews yet.</p>";
                return;
            }

            list.innerHTML = filtered.map(r => `
                <div class="rev-card">
                    <b>${r.name}</b>
                    <div style="color:#f1c40f; font-size:12px; margin:5px 0;">${'<i class="fas fa-star"></i>'.repeat(r.rating)}</div>
                    <p style="font-size:13px; color:#bbb;">${r.msg}</p>
                    ${r.img ? `<img src="${r.img}" class="rev-img-prev">` : ''}
                </div>
            `).join('');
        }

        function openDetail(n, p, i) {
            document.getElementById('d-name').innerText = n;
            document.getElementById('d-price').innerText = 'Rs ' + p;
            document.getElementById('d-img').src = i;
            document.getElementById('order-wa').onclick = () => window.location.href=`https://wa.me/923485491217?text=I want to buy ${n}`;
            document.getElementById('detail-page').classList.add('active');
            displayReviews(n);
        }

        function closePage(id) { document.getElementById(id).classList.remove('active'); }
        function openPage(id) { document.getElementById(id).classList.add('active'); }

        init();
    </script>
</body>
</html>
