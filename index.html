<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #eff0f5; font-family: 'Roboto', sans-serif; padding-bottom: 80px; }
        .daraz-orange { color: #f85606; }
        .daraz-bg-orange { background-color: #f85606; }
        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #f85606 !important; font-weight: bold; }
        .cartoon-card { background: white; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .cartoon-card:hover { transform: scale(1.02); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 shadow-sm p-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-3">
            <div onclick="showPage('home')" class="text-xl font-black daraz-orange italic cursor-pointer">ZAIN STORE</div>
            <div class="flex-1 relative">
                <input type="text" placeholder="Search products..." class="w-full bg-[#eff0f5] py-2 px-4 rounded-md text-sm outline-none">
                <i class="fa fa-search absolute right-3 top-2.5 text-gray-400"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-3">

        <section id="home" class="page active-page">
            <div class="w-full h-40 bg-gradient-to-r from-orange-500 to-red-600 rounded-lg flex flex-col justify-center px-6 text-white mb-6 shadow-md">
                <h2 class="text-2xl font-black italic">BUMPER SALE</h2>
                <p class="text-[10px] font-bold">EVERYTHING AT FACTORY PRICES</p>
            </div>

            <div class="grid grid-cols-4 gap-2 mb-8 text-center">
                <div onclick="showPage('shop')" class="cursor-pointer">
                    <div class="bg-white p-4 rounded-2xl shadow-sm mb-1 text-orange-500 mx-auto w-max"><i class="fa fa-clock"></i></div>
                    <span class="text-[10px] font-bold">Watches</span>
                </div>
                <div onclick="showPage('audio')" class="cursor-pointer">
                    <div class="bg-white p-4 rounded-2xl shadow-sm mb-1 text-blue-500 mx-auto w-max"><i class="fa fa-headphones"></i></div>
                    <span class="text-[10px] font-bold text-blue-600">Audio</span>
                </div>
                <div onclick="showPage('shop')" class="cursor-pointer">
                    <div class="bg-white p-4 rounded-2xl shadow-sm mb-1 text-green-500 mx-auto w-max"><i class="fa fa-plug"></i></div>
                    <span class="text-[10px] font-bold">Gadgets</span>
                </div>
                <div onclick="showPage('shop')" class="cursor-pointer">
                    <div class="bg-white p-4 rounded-2xl shadow-sm mb-1 text-red-500 mx-auto w-max"><i class="fa fa-fire"></i></div>
                    <span class="text-[10px] font-bold">Hot Sale</span>
                </div>
            </div>

            <h2 class="font-bold text-gray-800 mb-3 px-1">JUST FOR YOU</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                <div class="bg-white p-2 rounded shadow-sm">
                    <img src="watch.jpg" class="w-full h-32 object-contain">
                    <h3 class="text-[11px] mt-2 h-8 overflow-hidden">Crown H30 Smartwatch</h3>
                    <p class="daraz-orange font-bold text-sm">Rs. 2,500</p>
                </div>
            </div>
        </section>

        <section id="audio" class="page">
            <div class="flex items-center gap-2 mb-6">
                <button onclick="showPage('home')" class="bg-white p-2 rounded-full shadow-sm text-gray-500"><i class="fa fa-arrow-left"></i></button>
                <h2 class="text-xl font-black text-gray-800 italic">AUDIO WORLD</h2>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="cartoon-card p-3 shadow-sm border border-blue-50">
                    <div class="w-full h-32 bg-blue-50 rounded-lg flex items-center justify-center text-blue-400 mb-2">
                        <i class="fa fa-headphones text-5xl"></i>
                    </div>
                    <h3 class="text-[12px] font-bold text-gray-700">M10 Cartoon Buds</h3>
                    <p class="daraz-orange font-black text-sm">Rs. 1,500</p>
                    <button class="w-full daraz-bg-orange text-white text-[10px] font-bold py-2 mt-2 rounded-md uppercase">Add to Cart</button>
                </div>

                <div class="cartoon-card p-3 shadow-sm border border-purple-50">
                    <div class="w-full h-32 bg-purple-50 rounded-lg flex items-center justify-center text-purple-400 mb-2">
                        <i class="fa fa-music text-5xl"></i>
                    </div>
                    <h3 class="text-[12px] font-bold text-gray-700">Mini Bass Speaker</h3>
                    <p class="daraz-orange font-black text-sm">Rs. 2,200</p>
                    <button class="w-full daraz-bg-orange text-white text-[10px] font-bold py-2 mt-2 rounded-md uppercase">Add to Cart</button>
                </div>

                <div class="cartoon-card p-3 shadow-sm border border-green-50">
                    <div class="w-full h-32 bg-green-50 rounded-lg flex items-center justify-center text-green-400 mb-2">
                        <i class="fa fa-microphone-alt text-5xl"></i>
                    </div>
                    <h3 class="text-[12px] font-bold text-gray-700">Gaming Mic Pro</h3>
                    <p class="daraz-orange font-black text-sm">Rs. 3,500</p>
                    <button class="w-full daraz-bg-orange text-white text-[10px] font-bold py-2 mt-2 rounded-md uppercase">Add to Cart</button>
                </div>
            </div>
        </section>

        <section id="shop" class="page text-center py-20 text-gray-400">Shop items coming soon...</section>
        <section id="account" class="page text-center py-20 text-gray-400">Account details for Zain Ali...</section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-50 shadow-lg">
        <button onclick="showPage('home')" id="nav-home" class="nav-btn flex flex-col items-center nav-active"><i class="fa fa-home text-lg"></i><span class="text-[10px]">Home</span></button>
        <button onclick="showPage('shop')" id="nav-shop" class="nav-btn flex flex-col items-center text-gray-400"><i class="fa fa-store text-lg"></i><span class="text-[10px]">Shop</span></button>
        <button onclick="showPage('account')" id="nav-account" class="nav-btn flex flex-col items-center text-gray-400"><i class="fa fa-user text-lg"></i><span class="text-[10px]">Account</span></button>
        <a href="https://wa.me/923485491217" class="flex flex-col items-center text-green-500"><i class="fab fa-whatsapp text-lg"></i><span class="text-[10px]">Chat</span></a>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            const activeBtn = document.getElementById('nav-' + pageId);
            if(activeBtn) activeBtn.classList.add('nav-active');
            
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
