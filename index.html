<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zain Store | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #eff0f5; font-family: 'Roboto', sans-serif; padding-bottom: 70px; }
        .daraz-orange { color: #f85606; }
        .daraz-bg-orange { background-color: #f85606; }
        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .active-page { display: block; }
        .nav-active { color: #f85606; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 shadow-sm border-b hidden md:block">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="text-2xl font-black daraz-orange italic">ZAIN STORE</div>
            <nav class="flex gap-8 font-bold text-gray-600">
                <button onclick="showPage('home')" class="hover:text-orange-500">HOME</button>
                <button onclick="showPage('shop')" class="hover:text-orange-500">SHOP</button>
                <button onclick="showPage('account')" class="hover:text-orange-500">ACCOUNT</button>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">

        <section id="home" class="page active-page">
            <div class="w-full h-48 bg-gradient-to-r from-orange-500 to-red-600 rounded-lg flex items-center justify-center text-white mb-6 shadow-lg">
                <div class="text-center">
                    <h1 class="text-3xl font-black italic uppercase">Mega Eid Sale</h1>
                    <p class="text-sm">Welcome to Zain Store Official</p>
                </div>
            </div>
            <h2 class="font-bold text-gray-700 mb-4">FEATURED CATEGORIES</h2>
            <div class="grid grid-cols-3 gap-2">
                <div onclick="showPage('shop')" class="bg-white p-4 rounded text-center shadow-sm cursor-pointer"><i class="fa fa-clock text-orange-500 mb-2"></i><p class="text-[10px] font-bold">WATCHES</p></div>
                <div onclick="showPage('shop')" class="bg-white p-4 rounded text-center shadow-sm cursor-pointer"><i class="fa fa-headphones text-blue-500 mb-2"></i><p class="text-[10px] font-bold">BUDS</p></div>
                <div onclick="showPage('shop')" class="bg-white p-4 rounded text-center shadow-sm cursor-pointer"><i class="fa fa-mobile text-green-500 mb-2"></i><p class="text-[10px] font-bold">ACCESSORIES</p></div>
            </div>
        </section>

        <section id="shop" class="page">
            <h2 class="text-xl font-bold mb-4">All Products</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white p-2 rounded shadow-sm">
                    <img src="20260312_083356.jpg" class="w-full h-32 object-contain mb-2">
                    <h3 class="text-[10px] font-medium h-8 overflow-hidden">Crown H30 Smartwatch Ultra 2</h3>
                    <p class="daraz-orange font-bold text-sm mt-1">Rs. 2,500</p>
                    <a href="https://wa.me/923485491217" class="block w-full daraz-bg-orange text-white text-center py-1.5 rounded text-[10px] font-bold mt-2 uppercase">Buy Now</a>
                </div>
            </div>
        </section>

        <section id="account" class="page">
            <div class="bg-white rounded-lg shadow-sm p-6 text-center">
                <div class="w-20 h-20 bg-gray-200 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl text-gray-400">
                    <i class="fa fa-user"></i>
                </div>
                <h2 class="text-xl font-bold">Zain Ali</h2>
                <p class="text-gray-500 text-sm">zainstore.customer@example.com</p>
                <div class="mt-8 space-y-3 text-left">
                    <div class="flex items-center gap-4 p-3 border-b border-gray-100"><i class="fa fa-box text-orange-500"></i> My Orders</div>
                    <div class="flex items-center gap-4 p-3 border-b border-gray-100"><i class="fa fa-wallet text-green-500"></i> Easypaisa: 0348-5491217</div>
                    <div class="flex items-center gap-4 p-3"><i class="fa fa-sign-out text-red-500"></i> Logout</div>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 md:hidden z-50">
        <button onclick="showPage('home')" id="nav-home" class="flex flex-col items-center text-gray-400 nav-active">
            <i class="fa fa-home text-xl"></i><span class="text-[10px] mt-1">Home</span>
        </button>
        <button onclick="showPage('shop')" id="nav-shop" class="flex flex-col items-center text-gray-400">
            <i class="fa fa-store text-xl"></i><span class="text-[10px] mt-1">Shop</span>
        </button>
        <button onclick="showPage('account')" id="nav-account" class="flex flex-col items-center text-gray-400">
            <i class="fa fa-user text-xl"></i><span class="text-[10px] mt-1">Account</span>
        </button>
    </nav>

    <script>
        function showPage(pageId) {
            // All pages hide karein
            const pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active-page'));
            
            // Selected page show karein
            document.getElementById(pageId).classList.add('active-page');

            // Bottom Nav color change karein
            const navButtons = document.querySelectorAll('nav button');
            navButtons.forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById('nav-' + pageId).classList.add('nav-active');
            
            // Page top par scroll karein
            window.scrollTo(0, 0);
        }
    </script>

</body>
</html>
