<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | RAWALPINDI OFFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6801; --bg: #000; --card: #121212; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* --- HEADER --- */
        header { background: var(--primary); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .search-box { background: #fff; margin: 15px; padding: 12px; border-radius: 10px; display: flex; align-items: center; }
        .search-box input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 16px; }

        /* --- PRODUCT GRID --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; transition: 0.3s; }
        .img-box { height: 160px; background: #fff; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info { padding: 12px; }
        .price { color: var(--primary); font-weight: 800; font-size: 18px; margin-top: 5px; }

        /* --- TRACKING BOX --- */
        .section-title { padding: 15px 15px 0; font-size: 18px; font-weight: bold; color: var(--primary); }
        .tracking-card { background: #111; margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .track-input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        
        /* --- QR FOOTER (GALLERY STYLE) --- */
        .footer-qr { background: #080808; padding: 40px 20px; text-align: center; border-top: 2px solid var(--primary); margin-top: 30px; }
        .qr-white-bg { background: #fff; padding: 15px; display: inline-block; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(255,104,1,0.2); }
        .qr-white-bg img { width: 150px; height: 150px; display: block; }
        .store-details { color: #888; font-weight: bold; font-size: 14px; letter-spacing: 1px; margin-bottom: 10px; }
        .contact-info { font-size: 12px; color: #bbb; line-height: 1.8; }
        .contact-info i { color: red; margin-right: 5px; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 2000; }
        .nav-item { color: #666; text-align: center; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* --- WHATSAPP FLOAT --- */
        .wa-btn { position: fixed; bottom: 85px; right: 20px; background: #25d366; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 3000; text-decoration: none; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars" style="font-size: 20px;"></i>
        <b style="font-size: 20px; letter-spacing: 1px;">ZAIN STORE</b>
        <i class="fas fa-shopping-cart" style="font-size: 20px;"></i>
    </header>

    <div class="search-box">
        <i class="fas fa-search" style="color: #999;"></i>
        <input type="text" placeholder="Search gadgets, watches...">
    </div>

    <div class="grid" id="pGrid">
        </div>

    <div class="section-title">Track Your Order</div>
    <div class="tracking-card">
        <input type="text" class="track-input" placeholder="Enter Order ID (e.g. ZAIN-5541)">
        <button style="width:100%; padding:12px; background:var(--primary); border:none; color:#fff; font-weight:bold; border-radius:8px;">TRACK NOW</button>
    </div>

    <div class="footer-qr">
        <div class="qr-white-bg">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/923485491217" alt="QR">
        </div>
        <div class="store-details">ZAIN STORE | RAWALPINDI</div>
        <div class="contact-info">
            <p><i class="fas fa-map-marker-alt"></i> Shop #4, Main Bazar, Rawalpindi, Pakistan</p>
            <p><i class="fas fa-envelope" style="color:#3498db;"></i> support@zainstore.com</p>
            <p><i class="fas fa-phone-alt" style="color:#2ecc71;"></i> 0348-5491217</p>
        </div>
        <button style="background:transparent; border:1px solid #fff; color:#fff; padding:10px 25px; border-radius:20px; margin-top:20px; font-size:12px;">Go to website</button>
    </div>

    <a href="https://wa.me/923485491217" class="wa-btn"><i class="fab fa-whatsapp"></i></a>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
        <a href="#" class="nav-item"><i class="fas fa-th-large"></i>Shop</a>
        <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
        <a href="#" class="nav-item"><i class="fas fa-heart"></i>Wishlist</a>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/gviz/tq?tqx=out:csv';

        async function fetchStore() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                let html = '';
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 3) {
                        const name = cols[0].replace(/"/g,"");
                        const price = cols[1].replace(/"/g,"");
                        const img = cols[2].replace(/"/g,"");
                        html += `
                            <div class="card">
                                <div class="img-box"><img src="${img}" onerror="this.src='https://via.placeholder.com/150'"></div>
                                <div class="info">
                                    <p style="font-size:12px; height:32px; overflow:hidden;">${name}</p>
                                    <p class="price">Rs ${price}</p>
                                    <button onclick="window.location.href='https://wa.me/923485491217?text=I want to buy ${name}'" style="width:100%; padding:6px; background:#25d366; border:none; color:#fff; border-radius:5px; margin-top:8px; font-size:11px; font-weight:bold;">Order Now</button>
                                </div>
                            </div>
                        `;
                    }
                });
                document.getElementById('pGrid').innerHTML = html;
            } catch (e) {
                console.error("CSV Error");
            }
        }
        fetchStore();
    </script>
</body>
</html>
