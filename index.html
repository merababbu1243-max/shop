<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <header class="bg-white p-4 shadow text-center">
        <h1 class="text-2xl font-bold text-orange-600 uppercase">ZAIN STORE</h1>
    </header>
    
    <div id="productGrid" class="p-4 grid grid-cols-2 gap-4">
        <p id="msg" class="col-span-2 text-center text-gray-400">Loading products...</p>
    </div>

    <script>
        const ssID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const githubUser = 'merababbu1243-max'; // Aapka username
        const repoName = 'mera'; // Aapke repository ka naam
        
        const url = `https://docs.google.com/spreadsheets/d/${ssID}/gviz/tq?tqx=out:json`;

        fetch(url)
            .then(res => res.text())
            .then(text => {
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; 

                rows.forEach((row, i) => {
                    if (i === 0) return;
                    const name = row.c[0] ? row.c[0].v : 'Product';
                    const price = row.c[1] ? row.c[1].v : '0';
                    const imgName = row.c[2] ? row.c[2].v : '';
                    
                    // Image ka sahi link banana
                    const fullImgPath = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/${imgName}`;
                    
                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200" onclick="window.open('https://wa.me/923485491217?text=Salam, Order: ${name}')">
                            <img src="${fullImgPath}" class="w-full h-32 object-contain mb-2" onerror="this.src='https://via.placeholder.com/150?text=Wait+for+Refresh'">
                            <h4 class="text-[11px] font-bold text-gray-700 h-8 overflow-hidden">${name}</h4>
                            <p class="text-orange-600 font-bold">Rs. ${price}</p>
                            <button class="w-full mt-2 bg-orange-500 text-white text-[10px] py-1 rounded">Order Now</button>
                        </div>`;
                });
            })
            .catch(err => { 
                document.getElementById('msg').innerText = "Sheet data loading error!";
            });
    </script>
</body>
</html>
