<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | Tracking & Pro Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff6801; --bg: #0b0b0b; --card: #151515; --text: #ffffff; --success: #2ecc71; --gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-x: hidden; }

        /* --- UI COMPONENTS --- */
        header { background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 2000; border-radius: 0 0 20px 20px; }
        .page { display: none; padding: 15px; min-height: 100vh; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Tracking Timeline UI */
        .tracking-box { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .timeline { border-left: 2px solid #333; margin-left: 20px; padding-left: 30px; position: relative; }
        .step { margin-bottom: 25px; position: relative; color: var(--gray); }
        .step.active { color: var(--success); font-weight: bold; }
        .step::before { content: ''; position: absolute; left: -41px; top: 5px; width: 20px; height: 20px; border-radius: 50%; background: #333; border: 4px solid var(--bg); }
        .step.active::before { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Order Success Modal */
        #order-success { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; text-align: center; }
        .success-card { background: #fff; color: #000; padding: 30px; border-radius: 20px; width: 85%; }

        /* Form Inputs */
        .input-box { width: 100%; padding: 12px; background: #222; border: 1px solid #333; color: white; border-radius: 10px; margin-bottom: 12px; }
        .btn-track { background: var(--primary); color: #fff; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; z-index: 3000; }
        .nav-item { color: #888; text-align: center; font-size: 10px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <i class="fas fa-bars" onclick="alert('Sidebar Menu Connected')"></i>
            <b style="font-size:18px;">ZAIN STORE PRO</b>
            <i class="fas fa-search" onclick="showPage('home')"></i>
        </div>
    </header>

    <div id="home-page" class="page active">
        <div style="background: linear-gradient(to right, #ff6801, #ff9d5c); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <h3>Flash Sale Live! ✅</h3>
            <p style="font-size: 12px;">Ends In: <span id="timer">00:00:00</span></p>
        </div>
        <h3>Check Order Status</h3>
        <div class="tracking-box">
            <input type="text" id="trackInput" class="input-box" placeholder="Enter Order ID (e.g. ZAIN-1234)">
            <button class="btn-track" onclick="trackOrder()">TRACK NOW</button>
        </div>
        
        <div id="tracking-result" style="display:none;">
            <div class="tracking-box">
                <h4 id="track-id-display" style="color:var(--primary);"></h4>
                <div class="timeline">
                    <div class="step active"><i class="fas fa-check-circle"></i> Order Placed</div>
                    <div class="step active"><i class="fas fa-box"></i> Packed & Ready</div>
                    <div class="step active"><i class="fas fa-truck"></i> On the Way</div>
                    <div class="step"><i class="fas fa-home"></i> Delivered</div>
                </div>
            </div>
        </div>
    </div>

    <div id="tracking-page" class="page">
        <h2>Order Tracking</h2>
        <p>Enter your ID to see live location.</p>
        </div>

    <div id="cart-page" class="page">
        <h2>Order Confirmation</h2>
        <div class="tracking-box">
            <input type="text" id="custName" class="input-box" placeholder="Customer Name">
            <input type="text" id="custPhone" class="input-box" placeholder="WhatsApp Number">
            <textarea id="custAddr" class="input-box" placeholder="Shipping Address"></textarea>
            <button class="btn-track" style="background:var(--success);" onclick="placeFinalOrder()">CONFIRM & GENERATE INVOICE</button>
        </div>
    </div>

    <div id="order-success">
        <div class="success-card">
            <i class="fas fa-check-circle" style="font-size: 60px; color: var(--success);"></i>
            <h2 style="margin-top:15px;">Order Placed!</h2>
            <p style="margin: 10px 0;">Order ID: <b id="new-order-id"></b></p>
            <p style="font-size: 13px; color: #666;">Note: Please take a screenshot for tracking.</p>
            <button class="btn-track" onclick="closeSuccess()">GO TO HOME</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="showPage('cart')"><i class="fas fa-shopping-bag"></i>Order</div>
        <div class="nav-item" onclick="alert('Notification System Active')"><i class="fas fa-bell"></i>Alerts</div>
    </div>

    <script>
        // Page Switching
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
        }

        // Order Placement Logic
        function placeFinalOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            if(!name || !phone) return alert("Please fill all details!");

            const orderID = "ZAIN-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('new-order-id').innerText = orderID;
            
            // Save to LocalStorage for tracking
            localStorage.setItem(orderID, JSON.stringify({
                status: 'shipped',
                name: name,
                date: new Date().toLocaleDateString()
            }));

            document.getElementById('order-success').style.display = 'flex';
        }

        function closeSuccess() {
            document.getElementById('order-success').style.display = 'none';
            showPage('home');
        }

        // Tracking Logic
        function trackOrder() {
            const id = document.getElementById('trackInput').value.toUpperCase();
            const orderData = localStorage.getItem(id);

            if(orderData) {
                document.getElementById('tracking-result').style.display = 'block';
                document.getElementById('track-id-display').innerText = "Status for " + id;
                // You can customize timeline based on orderData.status here
            } else {
                alert("Order ID not found! Try ZAIN-1234 (Sample)");
            }
        }

        // Timer
        setInterval(() => {
            const now = new Date();
            const time = `${23-now.getHours()}:${59-now.getMinutes()}:${59-now.getSeconds()}`;
            document.getElementById('timer').innerText = time;
        }, 1000);
    </script>
</body>
</html>
