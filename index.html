<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAIN STORE | Reviews & Shopping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff6801;
            --bg: #000000;
            --card: #161616;
            --text: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 90px; }

        /* --- Header --- */
        header { background: var(--primary); padding: 15px; position: sticky; top: 0; z-index: 2000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .search-wrapper { background: white; border-radius: 10px; display: flex; align-items: center; padding: 10px; margin-top: 15px; }
        .search-wrapper input { border: none; outline: none; width: 100%; margin-left: 10px; color: #333; }

        /* --- Grid --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .p-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; }
        .p-card img { width: 100%; height: 160px; object-fit: cover; background: white; }
        .p-info { padding: 10px; }
        .p-price { color: var(--primary); font-weight: bold; font-size: 18px; }

        /* --- Pages --- */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; overflow-y: auto; }
        .page.active { display: block; }
        .page-header { background: var(--primary); padding: 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; }

        /* --- REVIEW SYSTEM CSS --- */
        .review-section { padding: 20px; background: #111; margin-top: 20px; border-radius: 15px; }
        .rating-stars { color: #f1c40f; margin-bottom: 10px; font-size: 20px; }
        .review-form input, .review-form textarea { 
            width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; 
        }
        .file-input-wrapper { margin-bottom: 10px; }
        .submit-rev-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; }
        
        .user-review-card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 15px; border-left: 4px solid var(--primary); }
        .rev-img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-top: 10px; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 4000; }
        .nav-item { color: #888; text-align: center; font-size: 11px; }
        .nav-item.active { color: var(--primary); }

        .btn-group { position: fixed; bottom: 0; width: 100%; display: flex; height: 65px; z-index: 6000; }
        .btn-add { flex: 1; background: #333; color: white; border: none; }
        .btn-order { flex: 1; background: var(--primary); color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <i class="fas fa-bars" style="font-size:22px;"></i>
            <b style="font-size:20px;">ZAIN STORE</b>
            <i class="fas fa-shopping-cart" onclick="openPage('cart-page')"></i>
        </div>
        <div class="search-wrapper">
            <i class="fas fa-search" style="color:#888;"></i>
            <input type="text" id="mainSearch" onkeyup="search()" placeholder="Search Products (Live)...">
        </div>
    </header>

    <div class="grid" id="productGrid"></div>

    <div id="detail-page" class="page">
        <div class="page-header"><i class="fas fa-arrow-left" onclick="closePage('detail-page')"></i> Back</div>
        <img id="det-img" style="width:100%; height:300px; object-fit:contain; background:white;">
        <div style="padding:20px;">
            <h2 id="det-name"></h2>
            <h1 id="det-price" style="color:var(--primary);"></h1>
            
            <hr style="border:0.1px solid #222; margin:20px 0;">

            <div class="review-section">
                <h3>Customer Reviews</h3>
                <div id="display-reviews"></div>

                <div class="review-form" style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
                    <h4>Write a Review</h4>
                    <div class="rating-stars">
                        <i class="far fa-star" onclick="setStar(1)"></i>
                        <i class="far fa-star" onclick="setStar(2)"></i>
                        <i class="far fa-star" onclick="setStar(3)"></i>
                        <i class="far fa-star" onclick="setStar(4)"></i>
                        <i class="far fa-star" onclick="setStar(5)"></i>
                    </div>
                    <input type="text" id="rev-name" placeholder="Your Name">
                    <textarea id="rev-text" placeholder="Share your experience..."></textarea>
                    <div class="file-input-wrapper">
                        <label style="font-size:12px; color:#888;">Upload Product Photo:</label><br>
                        <input type="file" id="rev-file" accept="image/*" style="border:none; padding:5px 0;">
                    </div>
                    <button class="submit-rev-btn" onclick="submitReview()">POST REVIEW</button>
                </div>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-add">ADD TO CART</button>
            <button class="btn-order" id="wa-btn">ORDER ON WHATSAPP</button>
        </div>
    </div>

    <div id="cart-page" class="page">
        <div class="page-header"><i class="fas fa-arrow-left" onclick="closePage('cart-page')"></i> Shopping Cart</div>
        <div id="cart-items" style="padding:20px; text-align:center;">Cart is empty!</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="openPage('cart-page')"><i class="fas fa-shopping-cart"></i><br>Cart</div>
        <div class="nav-item" onclick="window.location.href='https://wa.me/923485491217'"><i class="fab fa-whatsapp"></i><br>Help</div>
    </div>

    <script>
        const sheetURL = 'https://docs.google.com/spreadsheets/d/13J6c7r2r6-1jN5czgo8fn0Tmn-XFj7BFhLaUHe4kkRY/gviz/tq?tqx=out:csv';
        let allProducts = [];
        let currentRating = 0;

        async function loadStore() {
            const res = await fetch(sheetURL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            allProducts = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { name: c[0].replace(/"/g,''), price: c[1].replace(/"/g,''), img: c[2].replace(/"/g,'') };
            });
            render(allProducts);
        }

        function render(list) {
            document.getElementById('productGrid').innerHTML = list.map(p => `
                <div class="p-card" onclick="openDetail('${p.name.replace(/'/g,"\\'")}','${p.price}','${p.img}')">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-info">
                        <div style="font-size:13px; height:38px; overflow:hidden;">${p.name}</div>
                        <div class="p-price">Rs ${p.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function search() {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            render(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function openDetail(n, p, i) {
            document.getElementById('det-name').innerText = n;
            document.getElementById('det-price').innerText = 'Rs ' + p;
            document.getElementById('det-img').src = i;
            document.getElementById('wa-btn').onclick = () => window.location.href=`https://wa.me/923485491217?text=I want to order ${n}`;
            document.getElementById('detail-page').classList.add('active');
            displayStoredReviews(n);
        }

        function closePage(id) { document.getElementById(id).classList.remove('active'); }
        function openPage(id) { document.getElementById(id).classList.add('active'); }

        // --- REVIEW LOGIC ---
        function setStar(n) {
            currentRating = n;
            const stars = document.querySelectorAll('.rating-stars i');
            stars.forEach((s, i) => {
                s.className = (i < n) ? 'fas fa-star' : 'far fa-star';
            });
        }

        function submitReview() {
            const name = document.getElementById('rev-name').value;
            const text = document.getElementById('rev-text').value;
            const fileInput = document.getElementById('rev-file');
            const productName = document.getElementById('det-name').innerText;

            if(!name || !text || currentRating === 0) return alert("Please fill name, text and rating!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const review = {
                    name, text, rating: currentRating, 
                    img: e.target ? e.target.result : null,
                    product: productName,
                    date: new Date().toLocaleDateString()
                };
                saveReview(review);
            };

            if(fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]);
            else {
                saveReview({ name, text, rating: currentRating, img: null, product: productName, date: new Date().toLocaleDateString() });
            }
        }

        function saveReview(rev) {
            let reviews = JSON.parse(localStorage.getItem('zain_reviews')) || [];
            reviews.push(rev);
            localStorage.setItem('zain_reviews', JSON.stringify(reviews));
            alert("Review Posted Successfully!");
            displayStoredReviews(rev.product);
            // Reset Form
            document.getElementById('rev-name').value = '';
            document.getElementById('rev-text').value = '';
            setStar(0);
        }

        function displayStoredReviews(prodName) {
            const container = document.getElementById('display-reviews');
            let reviews = JSON.parse(localStorage.getItem('zain_reviews')) || [];
            const filtered = reviews.filter(r => r.product === prodName);

            if(filtered.length === 0) {
                container.innerHTML = "<p style='color:#555;'>No reviews yet. Be the first!</p>";
                return;
            }

            container.innerHTML = filtered.map(r => `
                <div class="user-review-card">
                    <b>${r.name}</b> <span style="font-size:10px; color:#666;">(${r.date})</span>
                    <div style="color:#f1c40f; font-size:12px; margin:5px 0;">
                        ${'<i class="fas fa-star"></i>'.repeat(r.rating)}
                    </div>
                    <p style="font-size:14px; color:#ccc;">${r.text}</p>
                    ${r.img ? `<img src="${r.img}" class="rev-img-preview">` : ''}
                </div>
            `).join('');
        }

        loadStore();
    </script>
</body>
</html>
