<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAIN STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <header class="bg-white p-4 shadow-md text-center sticky top-0 z-50">
        <h1 class="text-3xl font-bold text-orange-600 italic tracking-tighter">ZAIN STORE</h1>
    </header>

    <main class="p-4">
        <div class="bg-orange-500 rounded-2xl p-6 text-white text-center mb-6 shadow-md">
            <h2 class="text-xl font-bold uppercase tracking-wide">Our Premium Collection</h2>
            <p class="text-[10px] opacity-80 mt-1 uppercase tracking-widest">Shop Directly from Google Sheets</p>
        </div>

        <div id="productGrid" class="grid grid-cols-2 gap-4">
            <p id="msg" class="col-span-2 text-center py-10 text-gray-400">Loading Products...</p>
        </div>
    </main>

    <script>
        // Sahi ID aur Details
        const sheetID = '1WWBuGylAgkewrUXS99CbJV3g3ZsM8nGz4fyA5g6Bp4s';
        const githubUser = 'merababbu1243-max';
        const repoName = 'mera';
        
        // Asaan image load karne ke liye simple format
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv&gid=0`;

        fetch(url)
            .then(res => res.text())
            .then(csv => {
                const rows = csv.split('\n').map(r => r.split(','));
                const grid = document.getElementById('productGrid');
                grid.innerHTML = ''; 

                // Header chor kar data Row 2 se start karenge
                for (let i = 1; i < rows.length; i++) {
                    const name = rows[i][0] ? rows[i][0].replace(/"/g, '') : '';
                    const price = rows[i][1] ? rows[i][1].replace(/"/g, '') : '';
                    const imgName = rows[i][2] ? rows[i][2].replace(/"/g, '').trim() : '';
                    
                    if(!name) continue; // Agar naam khali ho to agay barhein

                    // GitHub par image ka rasta. Folder 'shop' ka khayal rakhein
                    const photoUrl = `https://raw.githubusercontent.com/${githubUser}/${repoName}/main/shop/${imgName}`;

                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center" onclick="window.open('https://wa.me/923485491217?text=Assalam-o-Alaikum, I want to buy: ${name}')">
                            <div class="h-32 w-full flex items-center justify-center bg-gray-50 rounded-xl mb-3 overflow-hidden">
                                <img src="${photoUrl}" class="max-h-full max-w-full object-contain" onerror="this.src='https://via.placeholder.com/150?text=Wait+for+Refresh'">
                            </div>
                            <h4 class="text-[10px] font-bold text-gray-700 uppercase h-8 overflow-hidden line-clamp-2 w-full text-center">${name}</h4>
                            <p class="text-orange-600 font-extrabold text-sm mt-1">Rs. ${price}</p>
                            <button class="w-full mt-3 bg-orange-50 text-[9px] font-bold text-orange-600 py-1.5 rounded-lg border border-orange-100 hover:bg-orange-100 transition">ORDER NOW</button>
                        </div>`;
                }
            })
            .catch(err => {
                document.getElementById('msg').innerText = "Check Sheet Access!";
            });
    </script>
</body>
</html>
